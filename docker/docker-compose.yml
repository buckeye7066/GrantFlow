version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: grantflow
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: grantflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://grantflow:supersecret@postgres:5432/grantflow
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  crawler:
    build:
      context: ../jobs/crawler-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://grantflow:supersecret@postgres:5432/grantflow
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: ../jobs/scheduler
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: https://api.localhost
    depends_on:
      - api
    ports:
      - "3000:3000"

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - api

volumes:
  pgdata:

